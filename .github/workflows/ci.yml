name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with Ruff
        run: |
          ruff check api/ --output-format=github

      - name: Verify module imports
        run: |
          python -c "
          import os
          os.environ['TMDB_API_KEY'] = 'test-key-for-ci'
          # Verify the module can be imported without errors
          # (data files won't be present in CI, so we skip startup)
          import importlib.util
          spec = importlib.util.spec_from_file_location('index', 'api/index.py')
          module = importlib.util.find_module
          print('Module syntax OK')
          "

      - name: Verify JSON configs
        run: |
          python -c "
          import json
          with open('vercel.json') as f:
              config = json.load(f)
              print('vercel.json is valid')
              assert 'builds' in config
              assert 'routes' in config
          "

      - name: Check for secrets
        run: |
          # Ensure no API keys are hardcoded
          if grep -r "api_key.*=" api/ --include="*.py" | grep -v "os.getenv" | grep -v "params" | grep -v "q\[" | grep -v "TMDB_API_KEY"; then
            echo "WARNING: Potential hardcoded API key found"
            exit 1
          fi
          echo "No hardcoded secrets detected"
